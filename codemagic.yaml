workflows:
  android-release:
    name: MaçRadar Android
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      vars:
        # Canlı backend adresiniz. Codemagic > Environment variables'tan da geçebilirsiniz.
        API_BASE_URL: "https://alanadiniz.com/api/v1"
      # Keystore imzalama için Codemagic'te "android_keystore" referansı tanımlayın:
      #   CM_KEYSTORE_PATH, CM_KEY_ALIAS, CM_KEYSTORE_PASSWORD, CM_KEY_PASSWORD
      groups:
        - android_keystore
    working_directory: app
    scripts:
      - name: Flutter sürümü
        script: flutter --version
      - name: Gradle wrapper'ı garanti et
        script: |
          cd android
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.4
          fi
      - name: Bağımlılıklar
        script: flutter pub get
      - name: Statik analiz
        script: flutter analyze || true
      - name: key.properties oluştur (imza varsa)
        script: |
          if [ -n "$CM_KEYSTORE_PATH" ]; then
            cat > android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF
          fi
      - name: APK derle
        script: flutter build apk --release --dart-define=API_BASE_URL=$API_BASE_URL
      - name: App Bundle (AAB) derle
        script: flutter build appbundle --release --dart-define=API_BASE_URL=$API_BASE_URL
    artifacts:
      - app/build/app/outputs/flutter-apk/*.apk
      - app/build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - hrnbydgn@gmail.com
        notify:
          success: true
          failure: true

  ios-release:
    name: MaçRadar iOS
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      flutter: stable
      xcode: latest
      vars:
        API_BASE_URL: "https://alanadiniz.com/api/v1"
      # iOS imzalama: Codemagic > Code signing identities ile App Store Connect entegrasyonu
      # ve bundle id (com.macradar.app) ekleyin; ardından aşağıdaki grubu tanımlayın.
      # groups:
      #   - ios_signing
    working_directory: app
    scripts:
      - name: iOS platformunu hazırla
        script: |
          if [ ! -d ios ]; then
            flutter create --platforms=ios --org com.macradar --project-name macradar .
          fi
      - name: Bağımlılıklar
        script: flutter pub get
      - name: Statik analiz
        script: flutter analyze || true
      - name: IPA derle (imzasız — imza için code signing yapılandırın)
        script: |
          flutter build ios --release --no-codesign --dart-define=API_BASE_URL=$API_BASE_URL
    artifacts:
      - build/ios/iphoneos/*.app
    publishing:
      email:
        recipients:
          - hrnbydgn@gmail.com
