workflows:
  android-release:
    name: MaçRadar Android
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      vars:
        # Canlı backend adresi. Codemagic > Environment variables'tan da değiştirebilirsiniz.
        API_BASE_URL: "https://webdigistore.com/macradar/api/v1"
      # İMZALAMA (opsiyonel): Play Store'a yükleyecekseniz Codemagic'te bir değişken
      # grubu (ör. "android_keystore") oluşturup şu değişkenleri ekleyin:
      #   CM_KEYSTORE_PATH, CM_KEY_ALIAS, CM_KEYSTORE_PASSWORD, CM_KEY_PASSWORD
      # Ardından aşağıdaki 2 satırın yorumunu kaldırın:
      # groups:
      #   - android_keystore
    scripts:
      - name: Flutter sürümü
        script: flutter --version
      - name: Bağımlılıklar
        script: flutter pub get
      - name: Statik analiz (build'i durdurmaz)
        script: flutter analyze || true
      - name: key.properties oluştur (imza tanımlıysa)
        script: |
          if [ -n "$CM_KEYSTORE_PATH" ]; then
            cat > android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF
            echo "key.properties oluşturuldu (release imzası kullanılacak)."
          else
            echo "Keystore tanımlı değil; release APK debug anahtarıyla imzalanacak (test build)."
          fi
      - name: APK derle (release)
        script: flutter build apk --release --android-skip-build-dependency-validation --dart-define=API_BASE_URL="$API_BASE_URL"
      - name: App Bundle derle (AAB - Play Store)
        script: flutter build appbundle --release --android-skip-build-dependency-validation --dart-define=API_BASE_URL="$API_BASE_URL"
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - hrnbydgn@gmail.com
        notify:
          success: true
          failure: true
